services:
  scrapers:
    image: scrapers:latest
    container_name: scrapers
    build: .
    environment:
      DATA_DIR: /data
      PORT: "3101"
      # Set to "true" to repopulate JSON after a fresh volume (runs in background).
      # SCRAPE_ON_STARTUP: "true"
    ports:
      - "3101:3101"
    volumes:
      # Named volume survives redeploys; bind ./data instead for local inspection.
      - scrapers_data:/data
    restart: unless-stopped

volumes:
  scrapers_data:
